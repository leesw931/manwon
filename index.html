<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>명랑 가치 설문</title>

  <!-- 미리보기 낚시용 (원하면 이미지 URL 바꿔) -->
  <meta property="og:title" content="골프 예약 설문">
  <meta property="og:description" content="명랑골프 멤버 설문 참여">
  <meta property="og:image" content="https://이미지URL">

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
      transition: 0.3s;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 40px;
    }

    button {
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      cursor: pointer;
      border-radius: 8px;
      border: none;
      background-color: #4CAF50;
      color: white;
    }

    button:hover {
      opacity: 0.8;
    }

    #homeBtn {
      margin-top: 50px;
      background-color: gray;
      font-size: 14px;
      padding: 8px 15px;
    }

    #troll {
      display: none;
      margin-top: 50px;
      font-size: 40px;
      font-weight: bold;
      color: red;
      word-break: break-all;
    }
  </style>
</head>

<body>

  <h1>명랑은 당신에게 얼마의 가치가 있나요?</h1>

  <button onclick="goImage()">1. 만원 이상</button>
  <button onclick="trollMode()">2. 만원 이하</button>

  <div id="troll"></div>

  <!-- 홈 버튼 -->
  <div>
    <button id="homeBtn" onclick="goHome()">홈으로</button>
  </div>

  <script>
    function goImage() {
      window.location.href = "image.html";
    }

    function trollMode() {
      const trollDiv = document.getElementById("troll");
      trollDiv.style.display = "block";

      // 배경도 바꿔서 더 강하게
      document.body.style.background = "black";
      document.body.style.color = "white";

      let text = "";
      for (let i = 0; i < 200; i++) {
        text += "나가 이새끼야 ";
      }
      trollDiv.innerText = text;
    }

    function goHome() {
      location.reload(); // 초기 상태로 복귀
    }
  </script>

</body>
</html>
